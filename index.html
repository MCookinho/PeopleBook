<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeopleBook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header id="book-header">
            <h1 id="book-title">The People's Book</h1>
        </header>

        <main id="book-content">
            <div id="book-text">
                <p class="loading-text">Loading story...</p>
            </div>
        </main>

        <div id="bottom-panel">
            <div id="panel-toggle">
                <span id="toggle-icon">&#9650;</span>
            </div>
            <div id="panel-content">
                <div id="user-section">
                    <div id="user-info" class="hidden">
                        <span id="username-display"></span>
                        <button id="btn-logout" class="btn-small">Logout</button>
                    </div>
                    <button id="btn-login" class="btn-github">
                        <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor">
                            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                        </svg>
                        Login with GitHub
                    </button>
                </div>

                <div id="actions-section" class="hidden">
                    <button id="btn-add-content" class="btn-primary">Add Content</button>
                    <button id="btn-export-pdf" class="btn-secondary">Export PDF</button>
                </div>

                <div id="timers-section">
                    <div id="cooldown-timer" class="timer hidden">
                        <span class="timer-label">Next contribution:</span>
                        <span id="cooldown-time" class="timer-value">00:00:00</span>
                    </div>
                    <div id="rewrite-timer" class="timer">
                        <span class="timer-label">Next AI rewrite:</span>
                        <span id="rewrite-time" class="timer-value">--d --h --m</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="modal-overlay" class="hidden">
            <div id="modal">
                <div id="modal-header">
                    <h2>Add Your Contribution</h2>
                    <button id="btn-close-modal" class="btn-close">&times;</button>
                </div>
                <div id="modal-body">
                    <textarea id="text-input" maxlength="500" placeholder="Write your part of the story here... (max 500 characters)"></textarea>
                    <div id="char-count"><span id="current-chars">0</span>/500</div>
                    <button id="btn-submit" class="btn-primary" disabled>Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
